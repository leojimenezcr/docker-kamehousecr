version: '3.8'

services:
  blackbox:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    volumes:
      - ${BASE_DIR}/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - isp-monitor-internal-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: "1000:1000"
    restart: unless-stopped
    volumes:
      - ${BASE_DIR}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${BASE_DIR}/prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      # Expuesto vía proxy bajo /prometheus/ en lugar del puerto 9090 — sin
      # esto los links/redirects internos de la UI de Prometheus asumen raíz.
      - '--web.external-url=https://kamehousecr.ddns.net/prometheus/'
      - '--web.route-prefix=/prometheus/'
    networks:
      - isp-monitor-internal-net
      - isp-monitor-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "1000:1000"
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      # Expuesto vía proxy bajo /grafana/ en lugar del puerto 3000 — soporte
      # oficial de subpath de Grafana (ver docs de GF_SERVER_*).
      - GF_SERVER_ROOT_URL=https://kamehousecr.ddns.net/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ${BASE_DIR}/grafana-data:/var/lib/grafana
    networks:
      - isp-monitor-internal-net
      - isp-monitor-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  isp-monitor-internal-net:
  # Red compartida con el stack `proxy` (consumida ahí como `external: true`)
  # para que grafana y prometheus salgan por subcarpeta en vez de puerto de
  # host. blackbox-exporter no la necesita: solo lo consume prometheus por
  # `isp-monitor-internal-net`, nunca se expone hacia afuera.
  isp-monitor-net:
    attachable: true
