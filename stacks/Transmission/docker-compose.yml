version: "2.4"

services:
  transmission:
    image: ghcr.io/linuxserver/transmission
    container_name: transmission
    volumes:
      - ${TRANSMISSION_CONFIG_DIR}:/config
      - ${TRANSMISSION_DOWNLOADS_DIR}:/downloads
      - ${TRANSMISSION_WATCH_DIR}:/watch
    environment:
      - PUID=1000
      - PGID=1001
      - TZ=America/Costa_Rica
      - USER="${USER}"
      - PASS="${PASS}"
    networks:
      - transmission-net
    ports:
#      - 9091:9091 #web
#      - 51413:51413 #torrent
#      - 51413:51413/udp #torrent upd
    restart: always

# Redes y volumenes utilizados por los servicios
networks:
  transmission-net:
