services:
  rasa:
    image: rasa/rasa:3.5.2
    container_name: rasa-faq-demo
    volumes:
      - ${RASA_FAQ_APP_DIR}:/app
    command: run -m models --enable-api --cors "*" --debug
    #ports:
    #  - 5005:5005
    networks:
      - rasa-demo-net
    restart: unless-stopped

  webchat:
    image: nginx:alpine
    container_name: rasa-webchat-demo
    volumes:
      - ${RASA_FAQ_WEBCHAT_INDEX_FILE}:/usr/share/nginx/html/index.html
    ports:
      - 8080:80
    networks:
      - rasa-demo-net
    restart: unless-stopped
      
networks:
  rasa-demo-net:
    attachable: true
