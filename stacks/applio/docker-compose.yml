version: '3.8'

services:
  applio:
    image: applio:3.2.9 # Custom build
    container_name: applio
    volumes:
      - ${APPLIO_MODELS_DIR}:/app/models
      - ${APPLIO_OUTPUTS_DIR}:/app/outputs
    ports:
      - "6969:6969"
    networks:
      - applio-net
    command: ["python3", "app.py", "--server-name", "0.0.0.0"]
    restart: unless-stopped

networks:
  applio-net:
    attachable: true
