version: '3.8'

services:
  blackbox:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ${BASE_DIR}/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - isp-monitor

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ${BASE_DIR}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${BASE_DIR}/prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - isp-monitor

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ${BASE_DIR}/grafana-data:/var/lib/grafana
    networks:
      - isp-monitor

networks:
  isp-monitor:
    driver: bridge
