# Servidor de música de alta calidad
services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      # https://www.navidrome.org/docs/usage/configuration/options/#available-options
      ND_DEFAULTLANGUAGE: es
    volumes:
      - type: bind
        source: /home/leojimenezcr/navidrome/navidromedata
        target: /data
      - type: bind
        source: /home/leojimenezcr/navidrome/music
        target: /music:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  navidrome-net:
    attachable: true