version: "2.4"

services:
  # Proxy reverso nginx + HTTPS con Let's Encrypt
  proxy:
    image: linuxserver/swag:latest
    container_name: proxy
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Costa_Rica

      # Configuracion de Let's Encrypt
      URL: "${URL}"
      VALIDATION: "http"
      EMAIL: "${EMAIL}"
      DHLEVEL: 4096
      # Dominios adicionales para el mismo certificado (SAN) - hoy
      # photoskamehousecr.ddns.net (immich), sin subdominio real porque el
      # plan gratuito de noip.com no lo permite.
      EXTRA_DOMAINS: "${EXTRA_DOMAINS}"
    ports:
      # Solo el proxy tiene puertos expuestos,
      # los demas contenedores salen por aqui.
      - "80:80"
      - "443:443"
    volumes:
      - type: bind
        source: ${BASE_DIR}
        target: /config
    networks:
      # La comunicacion con los contenedores es por
      # redes individuales, para proporcionar aislamiento.
      # Se declaran como "external" porque las crea el stack dueño de cada
      # app (portainer, nextcloud, navidrome, jellyfin, isp-monitor) — asi
      # Compose las reconecta solas en cada redeploy del proxy, sin pasos
      # manuales en la UI de Portainer.
      - portainer_portainer-net
      - nextcloud_nextcloud-net
      - navidrome_navidrome-net
      - jellyfin_jellyfin-net
      - immich_immichapp-net
      - isp-monitor_isp-monitor-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: always

# Redes y volumenes utilizados por los servicios
networks:
  portainer_portainer-net:
    external: true
  nextcloud_nextcloud-net:
    external: true
  navidrome_navidrome-net:
    external: true
  jellyfin_jellyfin-net:
    external: true
  immich_immichapp-net:
    external: true
  isp-monitor_isp-monitor-net:
    external: true
