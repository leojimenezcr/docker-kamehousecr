## Version 2021/04/27 - Changelog: https://github.com/linuxserver/docker-swag/commits/master/root/defaults/default

error_page 502 /502.html;

# redirect all traffic to https
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# main server block
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name kamehousecr.ddns.net;

    # enable subfolder method reverse proxy confs
    include /config/nginx/proxy-confs/*.subfolder.conf;

    # all ssl related config moved to ssl.conf
    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    # Portainer
    # https://kamehousecr.ddns.net/portainer
    #
    location ^~ /portainer/ {
        # Nginx no valida las variables asi que levantara aunque el host este abajo.
        # Requiere definir el DNS de docker.
        resolver 127.0.0.11 valid=30s;
        set $upstream_app portainer;
        set $upstream_port 9443;
        # El puerto 9443 de Portainer es HTTPS-only (con su propio cert
        # autofirmado) — mandarle tráfico plano (http) hace que rechace la
        # conexión ("Client sent an HTTP request to an HTTPS server").
        # proxy_ssl_verify off porque ese cert es autofirmado y esto es
        # tráfico interno (red docker), no expuesto tal cual afuera.
        set $upstream_proto https;
        proxy_ssl_verify off;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        include /config/nginx/proxy.conf;
    }

    # Webhook de redespliegue de stacks (GitOps updates). Portainer no
    # conoce el subpath /portainer/ (sus rutas de API son literalmente
    # /api/...), así que hay que quitar el prefijo antes de reenviar, o el
    # backend responde 404. Ver scripts/trigger-portainer-redeploy.sh y
    # docs/PORTAINER-SETUP.md — el puerto 9443 directo NO debe usarse para
    # esto porque expone el certificado autofirmado de Portainer, no el de
    # Let's Encrypt de SWAG.
    location ^~ /portainer/api/stacks/webhooks/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_app portainer;
        set $upstream_port 9443;
        # Ver comentario en el location /portainer/ de arriba: el puerto
        # 9443 es HTTPS-only, hay que hablarle en https (con verify off por
        # el cert autofirmado).
        set $upstream_proto https;
        proxy_ssl_verify off;

        rewrite ^/portainer/(.*)$ /$1 break;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        include /config/nginx/proxy.conf;
    }

    location ^~ /portainer/api/websocket/ {
        # Nginx no valida las variables asi que levantara aunque el host este abajo.
        # Requiere definir el DNS de docker.
        resolver 127.0.0.11 valid=30s;
        set $upstream_app portainer;
        set $upstream_port 9443;
        # Ver comentario en el location /portainer/ de arriba: el puerto
        # 9443 es HTTPS-only, hay que hablarle en https (con verify off por
        # el cert autofirmado).
        set $upstream_proto https;
        proxy_ssl_verify off;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port/api/websocket/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # Jellyfin
    # https://kamehousecr.ddns.net/jellyfin
    location ^~ /jellyfin {
        return 302 $scheme://$host/jellyfin/;
    }

    location ^~ /jellyfin/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_app jellyfin;
        set $upstream_port 8096;
        set $upstream_proto http;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        proxy_pass_request_headers on;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        # Disable buffering when the nginx proxy gets very resource heavy upon streaming
        proxy_buffering off;
    }

    location ^~ /transmission {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app transmission;
        set $upstream_port 9091;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        proxy_pass_header X-Transmission-Session-Id;
    }

    location ^~ /transmission/rpc {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app transmission;
        set $upstream_port 9091;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    # Navidrome
    # https://kamehousecr.ddns.net/navidrome
    location ^~ /navidrome {
        return 302 $scheme://$host/navidrome/;
    }

    location ^~ /navidrome/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_app navidrome;
        set $upstream_port 4533;
        set $upstream_proto http;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_read_timeout 300;
        proxy_buffering off;
    }

    # Nextcloud
    # https://kamehousecr.ddns.net
    location ~ / {
        # Nginx no valida las variables asi que levantara aunque el host este abajo.
        # Requiere definir el DNS de docker.
        include /config/nginx/resolver.conf;
        include /config/nginx/proxy.conf;

        set $upstream_app nextcloud;
        set $upstream_port 80;
        set $upstream_proto http;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        proxy_hide_header X-Frame-Options;
        proxy_max_temp_file_size 2048m;
	client_max_body_size 0;
    }
}


# enable subdomain method reverse proxy confs
include /config/nginx/proxy-confs/*.subdomain.conf;
